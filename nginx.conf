server {
    listen 80;
    server_name localhost;

    # 1. Servir os arquivos estáticos do Frontend (HTML/CSS/JS)
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # 2. Proxy para a API de Controle (Comandos Manuais)
    location /api/ {
        # 'backend' é o nome do container do Go no docker-compose
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Proxy Específico para o WebSocket (Exige cabeçalhos de Upgrade)
    location /ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400; # Impede que o Nginx derrube conexões longas
    }
}