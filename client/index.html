<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento do Data Center</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Painel de Controle - Data Center</h1>
    
    <div id="dashboard" class="grid-container">
        </div>

    <script src="js/script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <div id="drawer-overlay" onclick="closeDetailsModal()"></div>
    
    <div id="details-drawer">
        <div class="drawer-header">
            <h2 id="drawer-title">Detalhes do Nó --</h2>
            <button class="close-btn" onclick="closeDetailsModal()">&times;</button>
        </div>
        
        <div class="drawer-body">
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-label">Consumo Elétrico</span>
                    <span class="stat-value" id="drawer-power">-- W</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Latência Real</span>
                    <span class="stat-value" id="drawer-latency">-- ms</span>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="historyChart"></canvas>
            </div>
        </div>
    </div>

</body>
</html>
