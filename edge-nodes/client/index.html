<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento do Data Center</title>
    
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body>
    
    <header class="main-header">
        <h1>Datacenter Monitor</h1>
        <p>Telemetria</p>
    </header>

    <main class="dashboard-wrapper">
        <div class="zone-container critical-zone" id="zone-critical-wrapper" style="display: none;">
            <h2 class="zone-title">Atenção Requerida</h2>
            <div id="dashboard-critical" class="dashboard-grid"></div>
        </div>

        <div class="zone-container normal-zone">
            <h2 class="zone-title">Operação Normal</h2>
            <div id="dashboard-normal" class="dashboard-grid"></div>
        </div>
    </main>

    <div id="drawer-overlay" onclick="closeDetailsModal()"></div>
    
    <div id="details-drawer">
        <div class="drawer-header">
            <h2 id="drawer-title">Detalhes do Nó --</h2>
            <button class="close-btn" onclick="closeDetailsModal()">&times;</button>
        </div>
        
        <div class="drawer-body">
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-label">Consumo Elétrico</span>
                    <span class="stat-value" id="drawer-power">-- W</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Latência Real</span>
                    <span class="stat-value" id="drawer-latency">-- ms</span>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="historyChart"></canvas>
            </div>
        </div>
    </div>

</body>
</html>
